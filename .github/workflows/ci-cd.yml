name: Pipeline CI/CD - R.A.S. Automação

# 1. Definição dos Gatilhos (Triggers) baseados em eventos do repositório
on:
  push:
    branches: [ "main" ]
  release:
    types: [ created ]

jobs:
  # ----------------------------------------------------------------------------
  # REQUISITO 1: Executado em qualquer push na branch MAIN (Lint e Validação)
  # ----------------------------------------------------------------------------
  lint_and_test:
    name: 🛡️ Code Quality & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout do Código
        uses: actions/checkout@v4

      - name: 🔍 Executar Análise Estática (Lint Simulado)
        run: |
          echo "Iniciando verificação de sintaxe e lint dos scripts..."
          # Aqui rodaríamos ferramentas como ShellCheck para Bash ou JSHint/ESLint para código
          # Simulando validação básica de arquivos existentes
          if [ -f "deploy.sh" ]; then
            bash -n deploy.sh
          fi
          echo "✔ Todos os testes estáticos e validações de lint passaram com sucesso!"

  # ----------------------------------------------------------------------------
  # REQUISITO 2: Executado apenas na criação de uma TAG de versão (Release)
  # ----------------------------------------------------------------------------
  build_and_release:
    name: 📦 Geração de Artefato de Release
    needs: lint_and_test
    # Condicional estrita: Só executa se o gatilho original for uma Release/Tag
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout do Código
        uses: actions/checkout@v4

      - name: 🗜️ Compactar Arquivos do Projeto (.tar.gz)
        run: |
          echo "Empacotando binários e scripts da versão: ${{ github.ref_name }}..."
          # Cria um pacote contendo os arquivos essenciais do repositório
          tar -czvf ras-artifact-${{ github.ref_name }}.tar.gz *.sh README.md docker-compose.yml 2>/dev/null || tar -czvf ras-artifact-${{ github.ref_name }}.tar.gz README.md

      - name: 🚀 Upload do Artefato para a Release do GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: ras-artifact-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ----------------------------------------------------------------------------
  # REQUISITO 3: Disparo de Webhook Real no Discord pós-pipeline
  # ----------------------------------------------------------------------------
  notify_webhook:
    name: 📡 Notificação de Conclusão (Discord)
    needs: [lint_and_test, build_and_release]
    runs-on: ubuntu-latest
    if: always() # Garante que roda mesmo se o lint ou o build falharem
    steps:
      - name: 📡 Enviar Alerta para o Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Captura o resultado dos passos anteriores
          STATUS_LINT="${{ needs.lint_and_test.result }}"
          STATUS_RELEASE="${{ needs.build_and_release.result }}"
          
          # Se o lint passou e o release passou (ou foi pulado por não ser tag), é SUCESSO
          if [ "$STATUS_LINT" = "success" ] && [ "$STATUS_RELEASE" != "failure" ]; then
            COLOR=65280 # Verde em formato Decimal
            TITLE="🚀 Pipeline RAS - Sucesso!"
            DESC="O pipeline foi executado com sucesso na branch \`main\`.\n\n**Lint/QA:** ✔ Passou\n**Release:** ${{ needs.build_and_release.result || 'Ignorado (Não é Tag)' }}"
          else
            COLOR=16711680 # Vermelho em formato Decimal
            TITLE="❌ Pipeline RAS - Falhou!"
            DESC="Ocorreu um erro durante a execução da esteira automatizada.\n\nVerifique os logs no GitHub Actions imediatamente."
          fi

          # Monta o JSON formatado em Embed para o Discord ficar bonito
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "$TITLE",
              "description": "$DESC",
              "color": $COLOR,
              "footer": {
                "text": "Repositório: ${{ github.repository }} | Ator: ${{ github.actor }}"
              }
            }]
          }
          EOF
          )

          # Dispara o curl para o Discord
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK"
